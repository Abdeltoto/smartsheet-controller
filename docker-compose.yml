services:
  smartsheet-controller:
    build: .
    image: smartsheet-controller:latest
    container_name: smartsheet-controller
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Defaults overridable via .env
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SESSION_IDLE_TIMEOUT: ${SESSION_IDLE_TIMEOUT:-1800}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
