<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smartsheet Controller</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #060b18;
      color: #e8ecf4;
    }
    .chrome-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      max-height: 36px;
      padding: 0 10px;
      font-size: 11px;
      line-height: 1.25;
      background: rgba(10, 18, 40, 0.98);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .chrome-bar .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chrome-bar .dot.on { background: #3b82f6; box-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }
    .chrome-bar .dot.off { background: #475569; }
    .chrome-bar .msg {
      flex: 1;
      min-width: 0;
      margin: 0;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chrome-bar .msg strong {
      color: #e2e8f0;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .chrome-bar .btn-opts {
      flex-shrink: 0;
      width: 28px;
      height: 26px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: #94a3b8;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .chrome-bar .btn-opts:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }
    iframe {
      flex: 1;
      border: 0;
      width: 100%;
      min-height: 0;
      background: #0a1228;
    }
  </style>
</head>
<body>
  <header class="chrome-bar" id="chrome-bar" aria-label="Smartsheet context">
    <span class="dot off" id="status-dot" aria-hidden="true"></span>
    <p class="msg" id="hint">Loading…</p>
    <button type="button" class="btn-opts" id="btn-opts" title="Server URL & settings" aria-label="Open settings">⚙</button>
  </header>
  <iframe id="app" title="Smartsheet Controller"></iframe>
  <script src="sidepanel.js" type="module"></script>
</body>
</html>
