[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -ra --strict-markers --tb=short
markers =
    unit: pure-logic tests, no I/O, fast (default).
    integration: hits the real Smartsheet API (requires SMARTSHEET_TOKEN + SHEET_ID in .env).
    e2e: spins up FastAPI + WebSocket; uses a stub LLM (no real LLM calls unless ENABLE_LIVE_LLM=1).
    live_llm: makes real LLM calls (skipped unless ENABLE_LIVE_LLM=1).
filterwarnings =
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:starlette.*
