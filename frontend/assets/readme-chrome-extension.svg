<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Smartsheet Controller  Chrome extension (side panel)</title>
  <desc id="desc">Browser frame with Smartsheet grid on the left and the AI controller side panel on the right.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="55%" stop-color="#0d1a35"/>
      <stop offset="100%" stop-color="#151032"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.15)"/>
      <stop offset="100%" stop-color="rgba(15,23,50,0.95)"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="920" height="400" rx="24" fill="url(#bgGrad)"/>
  <rect x="28" y="28" width="864" height="344" rx="16" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Traffic / chrome bar -->
  <rect x="40" y="44" width="840" height="44" rx="10" fill="rgba(255,255,255,0.04)"/>
  <circle cx="60" cy="66" r="6" fill="#FF5F57" opacity="0.85"/>
  <circle cx="84" cy="66" r="6" fill="#FEBC2E" opacity="0.85"/>
  <circle cx="108" cy="66" r="6" fill="#28C840" opacity="0.85"/>
  <rect x="140" y="56" width="520" height="22" rx="6" fill="rgba(10,22,48,0.9)" stroke="rgba(96,165,250,0.22)" stroke-width="1"/>
  <text x="156" y="71" fill="#93C5FD" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">app.smartsheet.com/sheets/</text>
  <!-- Extension pill -->
  <rect x="700" y="54" width="168" height="26" rx="8" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>
  <circle cx="718" cy="67" r="8" fill="url(#accentLine)" opacity="0.9"/>
  <text x="732" y="71" fill="#E8ECF4" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="700">Side panel " MV3</text>
  <!-- Main content split -->
  <rect x="40" y="100" width="420" height="256" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="56" y="124" fill="#A1ADCC" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="0.08em" font-weight="600">SMARTSHEET</text>
  <!-- Mini grid -->
  <g opacity="0.65">
    <line x1="56" y1="136" x2="444" y2="136" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <line x1="56" y1="152" x2="444" y2="152" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="56" y1="168" x2="444" y2="168" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="56" y1="184" x2="444" y2="184" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="56" y1="200" x2="444" y2="200" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="120" y1="132" x2="120" y2="348" stroke="rgba(96,165,250,0.18)" stroke-width="1"/>
    <line x1="200" y1="132" x2="200" y2="348" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="280" y1="132" x2="280" y2="348" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="360" y1="132" x2="360" y2="348" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>
  <!-- Highlight cell -->
  <rect x="208" y="156" width="72" height="28" rx="4" fill="rgba(59,130,246,0.22)" stroke="rgba(96,165,250,0.45)" stroke-width="1"/>
  <!-- Side panel -->
  <rect x="476" y="100" width="404" height="256" rx="12" fill="url(#panelGrad)" stroke="rgba(59,130,246,0.28)" stroke-width="1.25"/>
  <rect x="476" y="100" width="404" height="36" rx="12" fill="rgba(59,130,246,0.08)"/>
  <rect x="476" y="124" width="404" height="12" fill="rgba(59,130,246,0.08)"/>
  <text x="492" y="122" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="700">Smartsheet Controller</text>
  <text x="768" y="122" fill="#86EFAC" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600">� sheet</text>
  <!-- Chat bubbles simplified -->
  <rect x="496" y="152" width="320" height="36" rx="10" fill="rgba(255,255,255,0.06)"/>
  <text x="510" y="174" fill="#C7D2FE" font-family="Inter, system-ui, sans-serif" font-size="10">Summarize this sheet by status column&</text>
  <rect x="528" y="200" width="288" height="52" rx="10" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="542" y="222" fill="#E8ECF4" font-family="Inter, system-ui, sans-serif" font-size="9.8">Done  Heres your breakdown:</text>
  <text x="542" y="238" fill="#A1ADCC" font-family="Inter, system-ui, sans-serif" font-size="9">| Pending | Done |  totals</text>
  <rect x="496" y="268" width="224" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="508" y="286" fill="#7E8AA8" font-family="Inter, system-ui, sans-serif" font-size="10">Ask anything about your sheet&</text>
  <!-- Arrow hint -->
  <path d="M460 228 L472 218 L472 238 Z" fill="rgba(96,165,250,0.5)"/>
  <line x1="440" y1="228" x2="460" y2="228" stroke="rgba(96,165,250,0.35)" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- Footer caption -->
  <text x="460" y="382" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Same backend &amp; tools as the web app  docked beside Smartsheet</text>
</svg>
